# ── Used when deploying to Render (set SPRING_PROFILES_ACTIVE=cloud) ─────────
# Set these as Environment Variables in Render dashboard:
#   DATABASE_URL  → jdbc:mysql://<railway-host>:<port>/akshaya_bank
#   DATABASE_USER → from Railway dashboard
#   DATABASE_PASSWORD → from Railway dashboard
#   JWT_SECRET    → any long random string
#   FRONTEND_URL  → https://your-app.vercel.app

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

server.port=${PORT:8080}
server.servlet.context-path=/api

app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}
