spring.application.name=akshaya-bank

# ── MySQL Local (change password if yours is different) ──────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/akshaya_bank?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=AkshayaBankSuperSecretKey2024JWTTokenMin256BitsLongForHS256Algorithm!!
app.jwt.expiration=86400000

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api

# ── CORS ──────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
